name: Deploy iOS to TestFlight

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: macos-14
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java (required for Flutter tool)
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Create iOS Platform Folder
        run: |
          cd mobile
          flutter create --platforms=ios --org com.seafeetstarken .

      - name: Configure Manual Signing in Xcode Project
        run: |
          python3 -c "
          import os
          path = 'mobile/ios/Runner.xcodeproj/project.pbxproj'
          with open(path, 'r') as f:
              content = f.read()

          # 1. Configurar Manual Signing em vez de Automatic
          content = content.replace('ProvisioningStyle = Automatic;', 'ProvisioningStyle = Manual;')
          content = content.replace('CODE_SIGN_STYLE = Automatic;', 'CODE_SIGN_STYLE = Manual;')
          
          # 2. Definir Team ID da Apple
          content = content.replace('DEVELOPMENT_TEAM = \"\";', 'DEVELOPMENT_TEAM = \"6H2443ML7C\";')
          
          # 3. Definir Identidade de Assinatura para Distribuição
          content = content.replace('CODE_SIGN_IDENTITY = \"iPhone Developer\";', 'CODE_SIGN_IDENTITY = \"Apple Distribution\";')
          content = content.replace('\"CODE_SIGN_IDENTITY[sdk=iphoneos*]\" = \"iPhone Developer\";', '\"CODE_SIGN_IDENTITY[sdk=iphoneos*]\" = \"Apple Distribution\";')
          
          # 4. Configurar o nome do Provisioning Profile nas configurações de Build
          content = content.replace('PROVISIONING_PROFILE_SPECIFIER = \"\";', 'PROVISIONING_PROFILE_SPECIFIER = \"Alces Barbearia AppStore Profile\";')
          content = content.replace('buildSettings = {', 'buildSettings = {\n\t\t\t\tPROVISIONING_PROFILE_SPECIFIER = \"Alces Barbearia AppStore Profile\";\n\t\t\t\tDEVELOPMENT_TEAM = \"6H2443ML7C\";')

          with open(path, 'w') as f:
              f.write(content)
          print('Xcode project modified successfully for Manual Signing!')
          "

      - name: Install Apple Certificate and Provisioning Profile
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.IOS_DISTRIBUTION_CERTIFICATE_BASE64 }}
          IOS_PRIVATE_KEY: ${{ secrets.IOS_PRIVATE_KEY }}
          IOS_DISTRIBUTION_PEM: ${{ secrets.IOS_DISTRIBUTION_PEM }}
          P12_PASSWORD: ${{ secrets.IOS_DISTRIBUTION_CERTIFICATE_PASSWORD }}
          BUILD_PROVISION_PROFILE_BASE64: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          # 1. Definir caminhos temporários
          CERTIFICATE_PATH=$RUNNER_TEMP/build_certificate.p12
          PP_PATH=$RUNNER_TEMP/build_pp.mobileprovision
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db

          # 2. Decodificar ou gerar o certificado p12 nativamente no macOS
          if [ -n "$IOS_PRIVATE_KEY" ] && [ -n "$IOS_DISTRIBUTION_PEM" ]; then
            echo "Generating P12 natively on macOS runner..."
            echo "$IOS_PRIVATE_KEY" > private.key
            echo "$IOS_DISTRIBUTION_PEM" > distribution.pem
            openssl pkcs12 -export -inkey private.key -in distribution.pem -out $CERTIFICATE_PATH -passout pass:"$P12_PASSWORD"
          else
            echo "Decoding P12 from base64 secret..."
            echo -n "$BUILD_CERTIFICATE_BASE64" | base64 --decode -o $CERTIFICATE_PATH
          fi

          # 3. Decodificar Provisioning Profile
          echo -n "$BUILD_PROVISION_PROFILE_BASE64" | base64 --decode -o $PP_PATH

          # 4. Criar e desbloquear keychain temporário
          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security default-keychain -s $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -t 3600 -u $KEYCHAIN_PATH

          # 5. Importar o certificado para o keychain
          security import $CERTIFICATE_PATH -k $KEYCHAIN_PATH -P "$P12_PASSWORD" -T /usr/bin/codesign -T /usr/bin/productsign
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

          # 6. Instalar o Provisioning Profile
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          UUID=$(security cms -D -i $PP_PATH | grep -A1 UUID | grep string | awk -F'[<>]' '{print $3}')
          cp $PP_PATH ~/Library/MobileDevice/Provisioning\ Profiles/$UUID.mobileprovision

      - name: Get Flutter dependencies
        run: |
          cd mobile
          flutter pub get

      - name: Build IPA
        env:
          TEAM_ID: ${{ secrets.APPLE_DEVELOPER_PORTAL_TEAM_ID }}
        run: |
          cd mobile
          
          # Criar o arquivo exportOptions.plist dinamicamente
          cat <<EOF > exportOptions.plist
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>method</key>
              <string>app-store</string>
              <key>teamID</key>
              <string>$TEAM_ID</string>
              <key>uploadSymbols</key>
              <true/>
              <key>uploadBitcode</key>
              <false/>
              <key>signingStyle</key>
              <string>manual</string>
              <key>signingCertificate</key>
              <string>Apple Distribution</string>
              <key>provisioningProfiles</key>
              <dict>
                  <key>com.seafeetstarken.alcesBarbearia</key>
                  <string>Alces Barbearia AppStore Profile</string>
              </dict>
          </dict>
          </plist>
          EOF

          # Build a release IPA
          flutter build ipa --release --export-options-plist=exportOptions.plist

      - name: Upload to TestFlight
        uses: apple-actions/upload-testflight-build@v1
        with:
          app-path: 'mobile/build/ios/ipa/alces_barbearia.ipa'
          issuer-id: ${{ secrets.APP_STORE_CONNECT_API_KEY_ISSUER }}
          api-key-id: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          api-private-key: ${{ secrets.APP_STORE_CONNECT_API_KEY_KEY }}
